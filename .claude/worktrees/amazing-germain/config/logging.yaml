# Logging Configuration for Wix API Data Pipeline
# This file provides detailed logging configuration for Python's logging module
# To use with dictConfig: logging.config.dictConfig(yaml.safe_load(open('config/logging.yaml')))

version: 1
disable_existing_loggers: false

formatters:
  simple:
    format: '%(levelname)s: %(message)s'

  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  json:
    # For structured logging (requires python-json-logger)
    # format: '%(asctime)s %(name)s %(levelname)s %(message)s'
    class: logging.Formatter
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/pipeline.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/pipeline_errors.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

loggers:
  # Root logger
  '':
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  # Pipeline-specific loggers
  wix_api:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  extractors:
    level: INFO
    handlers: [console, file]
    propagate: false

  transformers:
    level: INFO
    handlers: [console, file]
    propagate: false

  # Third-party library loggers (reduce verbosity)
  requests:
    level: WARNING
    handlers: [console, file]
    propagate: false

  urllib3:
    level: WARNING
    handlers: [console, file]
    propagate: false

  pyrate_limiter:
    level: WARNING
    handlers: [console, file]
    propagate: false

# Root logger configuration
root:
  level: INFO
  handlers: [console, file, error_file]
